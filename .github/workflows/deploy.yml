name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minishop-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minishop-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minishop-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minishop-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_PATH="${{ secrets.SERVER_APP_PATH }}"
            if [ -z "$APP_PATH" ]; then
              APP_PATH="/opt/minishop"
            fi

            if [ ! -d "$APP_PATH" ]; then
              echo "SERVER_APP_PATH does not exist: $APP_PATH"
              exit 1
            fi

            cd "$APP_PATH"

            git checkout main
            git pull --ff-only origin main

            printf '%s\n' "${{ secrets.SERVER_ENV_FILE }}" > .env.production

            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ github.sha }}"

            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            docker image prune -af --filter "until=72h"
